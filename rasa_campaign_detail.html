@font-face{font-family:'GMarketSans';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');font-weight:700;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2') format('woff2');font-weight:400;font-display:swap}

:root{
  --accent:#0584F4;
  --accent-dark:#0469C3;
  --bg:#FFFFFF;
  --bg-subtle:#F8F5F0;
  --bg-dark:#0A0A0A;
  --text:#111111;
  --text-muted:#6B6B6B;
  --border:rgba(0,0,0,0.08);
  --f-head:'GMarketSans','Noto Sans KR',sans-serif;
  --f-sans:'Suit','Noto Sans KR',sans-serif;
  --f-en:'Montserrat',sans-serif;
  --px:clamp(24px,5vw,80px);
  --max:1440px;
  --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f-sans);color:var(--text);background:var(--bg);overflow-x:hidden}
a{text-decoration:none;color:inherit}
.wrap{width:100%;max-width:calc(var(--max) + var(--px)*2);margin:0 auto;padding:0 var(--px)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;background:#0A0A0A}
.nav-inner{max-width:calc(var(--max) + var(--px)*2);margin:0 auto;height:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 var(--px)}
.nav-logo{font-family:var(--f-en);font-weight:800;color:#fff;font-size:18px;letter-spacing:.08em}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;align-items:center;justify-content:center;gap:40px}
.nav-links a{font-family:var(--f-sans);font-size:12px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.14em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:#fff}
.nav-right{display:flex;justify-content:flex-end;align-items:center;gap:12px}
.nav-cta{background:var(--accent);color:#fff;font-family:var(--f-sans);font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:10px 22px;border-radius:2px;transition:background .2s}
.nav-cta:hover{background:var(--accent-dark)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.hamburger span{display:block;width:22px;height:2px;background:#fff;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:#0A0A0A;padding:24px var(--px);flex-direction:column;gap:20px;z-index:99;border-top:1px solid rgba(255,255,255,.08)}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--f-sans);font-size:14px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.mobile-menu a:hover{color:#fff}
.mobile-menu .m-cta{background:var(--accent);color:#fff;padding:12px 20px;border-radius:2px;text-align:center;margin-top:8px}

/* ── 슬라이더 ── */
.slider-section{
  margin-top:var(--nav-h);
  background:var(--bg-subtle);
  padding:clamp(40px,5vw,64px) 0;
  overflow:hidden;
}

/* 트랙 컨테이너 — 화면 가득, overflow hidden */
.slider-outer{
  position:relative;
  width:100%;
  overflow:hidden;
  cursor:grab;
  user-select:none;
}
.slider-outer:active{cursor:grabbing}

/* 트랙 — 슬라이드들이 가로 나열 */
.slider-track{
  display:flex;
  gap:clamp(16px,2vw,28px);
  transition:transform .55s cubic-bezier(.16,1,.3,1);
  will-change:transform;
  /* 첫 슬라이드가 가운데 오도록 초기 오프셋은 JS에서 설정 */
}

/* 슬라이드 — 뷰포트 72% 너비, 가운데 1장이 dominant */
.slide{
  flex-shrink:0;
  width:72vw;
  max-width:900px;
  aspect-ratio:16/10;
  border-radius:4px;
  overflow:hidden;
  background:#D8D4CF;
  position:relative;
  transition:opacity .4s, transform .4s;
  opacity:.45;
  transform:scale(.97);
}
.slide.active{
  opacity:1;
  transform:scale(1);
}

.slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none}
.slide-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;font-family:var(--f-sans);letter-spacing:.08em;text-align:center;padding:16px}

/* 슬라이더 도트 */
.slider-dots{display:flex;justify-content:center;gap:6px;margin-top:clamp(20px,2.5vw,32px)}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.15);cursor:pointer;transition:all .25s}
.dot.active{background:var(--accent);width:22px;border-radius:3px}

/* ── 상세 정보 ── */
.detail-section{padding:clamp(56px,7vw,96px) 0 clamp(80px,10vw,140px)}
.detail-inner{max-width:760px}

/* 브레드크럼 */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:32px;font-size:12px;color:var(--text-muted)}
.breadcrumb a{color:var(--text-muted);transition:color .2s}
.breadcrumb a:hover{color:var(--accent)}
.breadcrumb span{color:rgba(0,0,0,.2)}

/* 카테고리 배지 */
.detail-cat{font-family:var(--f-en);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:var(--accent);color:#fff;padding:5px 14px;border-radius:2px;display:inline-block;margin-bottom:20px}

/* 제목 */
.detail-title{font-family:var(--f-head);font-size:clamp(28px,4vw,52px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:32px}

/* 메타 정보 */
.detail-meta{display:flex;flex-wrap:wrap;gap:clamp(24px,4vw,48px);padding:24px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:40px}
.meta-item{}
.meta-label{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.meta-val{font-family:var(--f-sans);font-size:14px;font-weight:600;color:var(--text)}

/* 본문 */
.detail-desc{font-size:clamp(14px,1.2vw,17px);color:var(--text-muted);line-height:1.9}
.detail-desc p+p{margin-top:1.4em}

/* 태그 */
.detail-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:40px}
.detail-tag{font-size:11px;font-weight:600;color:var(--text-muted);border:1.5px solid var(--border);border-radius:100px;padding:6px 14px;letter-spacing:.04em}

/* 이전/다음 네비 */
.detail-nav{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-top:clamp(56px,7vw,96px);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.detail-nav-item{background:var(--bg);padding:clamp(20px,3vw,32px);display:flex;flex-direction:column;gap:6px;transition:background .2s;cursor:pointer}
.detail-nav-item:hover{background:var(--bg-subtle)}
.detail-nav-item.next{align-items:flex-end;text-align:right}
.detail-nav-dir{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted)}
.detail-nav-title{font-family:var(--f-head);font-size:clamp(14px,1.4vw,18px);font-weight:700;color:var(--text);letter-spacing:-.01em}
.detail-nav-cat{font-size:11px;color:var(--accent);font-weight:600}

/* ── FOOTER CTA ── */
.ft-cta{background:#111;padding:clamp(64px,10vw,120px) var(--px);text-align:center}
.ft-cta-title{font-family:var(--f-en);font-size:clamp(24px,3.5vw,48px);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.1;margin-bottom:16px}
.ft-cta-title span{color:var(--accent)}
.ft-cta-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:40px}
.ft-cta-links{display:flex;align-items:center;justify-content:center;gap:clamp(32px,5vw,64px);flex-wrap:wrap}
.ft-link{font-family:var(--f-en);font-size:clamp(13px,1.3vw,17px);font-weight:700;color:#fff;letter-spacing:.04em;padding-bottom:4px;position:relative;transition:color .2s}
.ft-link::after{content:"";position:absolute;left:0;bottom:0;width:100%;height:1.5px;background:rgba(255,255,255,.25);border-radius:1px}
.ft-link::before{content:"";position:absolute;left:0;bottom:0;width:0;height:1.5px;background:var(--accent);border-radius:1px;transition:width .35s cubic-bezier(.16,1,.3,1)}
.ft-link:hover{color:var(--accent)}
.ft-link:hover::before{width:100%}

/* ── FOOTER ── */
.footer2{background:#0A0A0A;border-top:1px solid rgba(255,255,255,.07)}
.footer2-grid{display:grid;grid-template-columns:180px 1fr 1fr 1fr;gap:clamp(24px,4vw,60px);align-items:start;padding:clamp(48px,6vw,72px) 0}
.footer2-logo{font-family:var(--f-en);font-size:clamp(22px,2.5vw,32px);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1}
.footer2-logo span{color:var(--accent)}
.footer2-label{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px}
.footer2-val{font-size:clamp(13px,1.2vw,15px);color:rgba(255,255,255,.65);line-height:1.7}
.footer2-val-lg{font-size:clamp(16px,1.8vw,22px);font-weight:600;color:#fff}
.footer2-socials{display:flex;flex-direction:column;gap:8px}
.footer2-soc{font-size:14px;color:rgba(255,255,255,.5);transition:color .2s;font-weight:500}
.footer2-soc:hover{color:#fff}
.footer2-bar{background:var(--accent);padding:14px 0;text-align:center;font-family:var(--f-sans);font-size:12px;color:#fff;font-weight:500;letter-spacing:.04em}

@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .detail-nav{grid-template-columns:1fr}
  .footer2-grid{grid-template-columns:1fr 1fr;gap:32px}
}
@media(max-width:480px){
  .footer2-grid{grid-template-columns:1fr}
}
</style>

    date: '2023',
    tags: ['Macro 인플루언서', 'YouTube', '식품', '브랜디드 콘텐츠'],
    desc: `웃기면서 팔린다. 피식대학이 증명했다.\n\nM&M's 브랜드를 피식대학의 콘텐츠 안에 녹여냈습니다. 억지스럽지 않고, 끝까지 보게 되고, 공유하고 싶어지는 — 브랜디드 콘텐츠의 정석이었습니다.`,
    images: ["[이미지 — M&M's 01]", "[이미지 — M&M's 02]", "[이미지 — M&M's 03]"]
  },
  {
    id: 'glenlivet',
    cat: 'Influencer',
    catLabel: '인플루언서',
    client: '페르노리카 코리아 (글렌리벳)',
    date: '2024',
    tags: ['Instagram', 'Naver Blog', '주류·라이프스타일', '체험단'],
    desc: `위스키는 마시기 전에 먼저 눈으로 산다.\n\n라이프스타일 인플루언서의 피드 위에 글렌리벳을 올렸습니다. Instagram과 네이버 블로그, 체험단까지 — 브랜드가 일상 속 장면이 되자, 구매로 이어졌습니다.`,
    images: ['[이미지 — 글렌리벳 01]', '[이미지 — 글렌리벳 02]', '[이미지 — 글렌리벳 03]']
  }
];

// ── URL 파라미터에서 id 읽기 ──
const params = new URLSearchParams(location.search);
const currentId = params.get('id') || campaigns[0].id;
const currentIdx = campaigns.findIndex(c => c.id === currentId);
const data = campaigns[currentIdx] || campaigns[0];

// ── 타이틀 업데이트 ──
document.title = `RASA — ${data.client}`;

// ── 슬라이더 (infinite clone) ──
const track    = document.getElementById('sliderTrack');
const dotsWrap = document.getElementById('sliderDots');
const outer    = document.getElementById('sliderOuter');

const imgs = data.images;
const total = imgs.length;

// 슬라이드 생성 헬퍼
function makeSlide(content) {
  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = `<div class="slide-ph">${content}</div>`;
  return el;
}

// [clone_last] [0] [1] [2] [clone_first]  — 앞뒤 1개씩 클론
const cloneLast  = makeSlide(imgs[total - 1]);
const cloneFirst = makeSlide(imgs[0]);
track.appendChild(cloneLast);
imgs.forEach(img => track.appendChild(makeSlide(img)));
track.appendChild(cloneFirst);

// 도트 (실제 슬라이드 수만)
imgs.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i + 1)); // +1 because index 0 is cloneLast
  dotsWrap.appendChild(dot);
});

let cur = 1; // 실제 첫 슬라이드 index (0은 cloneLast)
let transitioning = false;

function slideW() {
  return track.children[0].offsetWidth + (parseInt(getComputedStyle(track).gap) || 24);
}
function outerW() { return outer.offsetWidth; }

function calcOffset(idx) {
  const sw = slideW();
  const ow = outerW();
  const sw0 = track.children[0].offsetWidth;
  return idx * sw - (ow - sw0) / 2;
}

function updateActive(idx) {
  // idx는 track 내 절대 인덱스, 실제 슬라이드는 1~total
  const realIdx = ((idx - 1) % total + total) % total;
  Array.from(track.children).forEach((s, i) => s.classList.toggle('active', i === idx));
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === realIdx));
}

function setPos(idx, animate) {
  if (!animate) {
    track.style.transition = 'none';
    // 브라우저가 none을 실제 적용한 후 transform 변경
    track.getBoundingClientRect(); // force reflow
  } else {
    track.style.transition = 'transform .55s cubic-bezier(.16,1,.3,1)';
  }
  track.style.transform = `translateX(${-calcOffset(idx)}px)`;
}

function goTo(idx) {
  if (transitioning) return;
  transitioning = true;
  cur = idx;
  setPos(cur, true);
  updateActive(cur);
}

// 트랜지션 끝 → 클론 경계에서 순간이동
track.addEventListener('transitionend', () => {
  transitioning = false;
  if (cur === 0) {
    cur = total;
    track.style.transition = 'none';
    track.style.transform  = `translateX(${-calcOffset(cur)}px)`;
    requestAnimationFrame(() => updateActive(cur));
  } else if (cur === total + 1) {
    cur = 1;
    track.style.transition = 'none';
    track.style.transform  = `translateX(${-calcOffset(cur)}px)`;
    requestAnimationFrame(() => updateActive(cur));
  }
});

// 초기 위치 (no animation)
requestAnimationFrame(() => requestAnimationFrame(() => {
  setPos(cur, false);
  updateActive(cur);
}));

// 드래그
let startX = 0;
outer.addEventListener('mousedown', e => { startX = e.clientX; });
window.addEventListener('mouseup', e => {
  const diff = e.clientX - startX;
  if (Math.abs(diff) > 48) goTo(diff < 0 ? cur + 1 : cur - 1);
});
// 터치
outer.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
outer.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (Math.abs(diff) > 40) goTo(diff < 0 ? cur + 1 : cur - 1);
}, {passive:true});

// ── 상세 렌더링 ──
const detail = document.getElementById('detailInner');
detail.innerHTML = `
  <div class="breadcrumb">
    <a href="rasa_campaign.html">Campaign</a>
    <span>/</span>
    <span>${data.catLabel}</span>
    <span>/</span>
    <span>${data.client}</span>
  </div>
  <span class="detail-cat">${data.cat}</span>
  <h1 class="detail-title">${data.client}</h1>
  <div class="detail-meta">
    <div class="meta-item">
      <div class="meta-label">Client</div>
      <div class="meta-val">${data.client}</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Category</div>
      <div class="meta-val">${data.catLabel}</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Year</div>
      <div class="meta-val">${data.date}</div>
    </div>
  </div>
  <div class="detail-desc">${data.desc.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
  <div class="detail-tags">${data.tags.map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>
`;

// ── 이전/다음 네비 ──
const nav = document.getElementById('detailNav');
const prev = currentIdx > 0 ? campaigns[currentIdx - 1] : null;
const next = currentIdx < campaigns.length - 1 ? campaigns[currentIdx + 1] : null;

nav.innerHTML = `
  ${prev
    ? `<div class="detail-nav-item prev" onclick="location.href='rasa_campaign_detail.html?id=${prev.id}'">
        <div class="detail-nav-dir">← Prev</div>
        <div class="detail-nav-title">${prev.client}</div>
        <div class="detail-nav-cat">${prev.catLabel}</div>
       </div>`
    : `<div class="detail-nav-item prev" style="opacity:.3;cursor:default">
        <div class="detail-nav-dir">← Prev</div>
        <div class="detail-nav-title">첫 번째 캠페인</div>
       </div>`
  }
  ${next
    ? `<div class="detail-nav-item next" onclick="location.href='rasa_campaign_detail.html?id=${next.id}'">
        <div class="detail-nav-dir">Next →</div>
        <div class="detail-nav-title">${next.client}</div>
        <div class="detail-nav-cat">${next.catLabel}</div>
       </div>`
    : `<div class="detail-nav-item next" style="opacity:.3;cursor:default;text-align:right">
        <div class="detail-nav-dir">Next →</div>
        <div class="detail-nav-title">마지막 캠페인</div>
       </div>`
  }
`;
</script>
</body>
</html>
